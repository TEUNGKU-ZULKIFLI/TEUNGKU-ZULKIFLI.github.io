<!-- Halaman Beranda - Desain Bersih dengan Bingkai Foto Hybrid & Lengan Kartun Berotot Pas Bahu -->
<div class="home-layout-clean">
    
    <!-- Bagian Kartu Visual Avatar Hybrid -->
    <div class="hybrid-avatar-section">
        <div class="avatar-svg-container">
            <!-- viewBox diatur ke 160 120 untuk memberi ruang lambaian lengan berotot di kanan tanpa terpotong sedikit pun -->
            <svg class="avatar-clean-svg" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Clip path persegi rounded untuk memotong foto 1:1 Anda secara otomatis -->
                    <clipPath id="photo-rect-clip">
                        <rect x="35" y="20" width="80" height="80" rx="16" ry="16" />
                    </clipPath>
                </defs>

                <!-- 1. Efek Bayangan/Kedalaman Lembut di Belakang Bingkai -->
                <rect x="38" y="23" width="80" height="80" rx="16" ry="16" fill="var(--bg-tertiary)" opacity="0.6" />

                <!-- 2. FOTO FORMAL WAJAH ASLI ANDA -->
                <!-- 
                  Rasio aspek foto Anda (3024x3024) adalah 1:1 (persegi). 
                  Jalur relatif menggunakan ./assets/profile.jpg agar aman dimuat dari root SPA.
                -->
                <image href="./assets/profile.jpg" 
                       x="35" y="20" width="80" height="80" 
                       clip-path="url(#photo-rect-clip)"
                       preserveAspectRatio="xMidYMid slice" />

                <!-- 3. Garis Bingkai Pembatas Foto (Border) -->
                <rect x="35" y="20" width="80" height="80" rx="16" ry="16" fill="none" stroke="var(--border-color)" stroke-width="2.5" />

                <!-- 4. LENGAN KANAN KARTUN SUPER BEROTOT (Diperbesar, Diturunkan, Menempel Sempurna) -->
                <!-- transform-origin diturunkan ke engsel bahu bawah (x=114, y=82) agar putaran lambaian tetap kokoh -->
                <g class="muscular-arm-wave">
                    <!-- Otot lengan baju / sleeve yang diperbesar & diturunkan secara masif untuk menutup sudut bawah foto -->
                    <path d="M 114,72 
                             C 122,70 128,76 126,88 
                             C 124,96 118,98 114,94 Z" 
                          fill="var(--accent)" stroke="var(--border-color)" stroke-width="2.5" />
                    
                    <!-- Otot Bisep Kartun Vektor yang Sangat Besar & Forearm Berotot Komik -->
                    <path d="M 116,84 
                             C 128,88 138,76 136,62 
                             C 134,54 144,40 139,30 
                             C 133,20 123,28 121,38 
                             C 118,48 110,58 114,68" 
                          fill="#fbcfe8" stroke="var(--border-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    
                    <!-- Kepalan Tangan Kartun Bulat Kuat (Diperbesar r=7.5) -->
                    <circle cx="137" cy="27" r="7.5" fill="#fbcfe8" stroke="var(--border-color)" stroke-width="2.5"/>
                    
                    <!-- Garis Detail Guratan Otot Bisep Dalam (Lebih Tebal dan Nyata) -->
                    <path d="M 124,56 Q 128,53 129,59" fill="none" stroke="var(--border-color)" stroke-width="2" stroke-linecap="round"/>
                </g>
            </svg>
        </div>
    </div>

    <!-- Bagian Teks & Identitas Utama -->
    <div class="profile-clean-text">
        <h1 id="hero-name" class="hero-clean-title"></h1>
        <h2 id="hero-role" class="hero-clean-subtitle"></h2>
        <p id="hero-tagline" class="hero-clean-desc"></p>

        <!-- Tombol Tindakan Utama (Call to Action) -->
        <div class="action-buttons-clean">
            <a href="#resume" class="btn-clean-primary">Download CV (IDN)</a>
            <a href="#terminal" class="btn-clean-secondary">⚡ Buka Terminal CLI</a>
        </div>
    </div>

</div>
