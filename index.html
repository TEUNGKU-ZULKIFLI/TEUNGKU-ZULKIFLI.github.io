<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teungku Zulkifli - Portofolio & Blog</title>
    
    <!-- CSS Variables dan Design Tokens -->
    <link rel="stylesheet" href="./css/variables.css">
    
    <!-- Gaya Utama Website -->
    <link rel="stylesheet" href="./css/main.css">

    <!-- Gaya Khusus Render Artikel Markdown (SOP Tahap 3) -->
    <link rel="stylesheet" href="./css/modules/markdown.css">

    <!-- Gaya Khusus Konsol Terminal Terpisah (Modular) -->
    <link rel="stylesheet" href="./css/modules/terminal.css">
</head>
<body>

    <!-- Header Website (App Navigation Shell - Stabil) -->
    <header id="app-header">
        <div class="header-container">
            <!-- Baris Atas: Brand & Tombol Mode -->
            <div class="header-top-row">
                <a href="#home" class="brand-title">TEUNGKU</a>
                <button id="theme-toggle" style="background: none; border: 1px solid var(--border-color); padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-primary); transition: all var(--transition-fast);"></button>
            </div>
            
            <!-- Menu Navigasi Ringkas (Bebas dari Menu Menumpuk) -->
            <nav id="main-nav">
                <a href="#home" class="nav-link active" data-link="home">Beranda</a>
                <a href="#about" class="nav-link" data-link="about">Tentang</a>
                <a href="#projects" class="nav-link" data-link="projects">Proyek</a>
                <a href="#sertifikasi" class="nav-link" data-link="sertifikasi">Sertifikasi</a>
                <a href="#blog" class="nav-link" data-link="blog">Blog</a>
            </nav>
        </div>
    </header>

    <!-- Kontainer Konten Dinamis (Main Viewport) -->
    <main id="app-content">
        <div class="loading-state">
            <p>Memuat konten...</p>
        </div>
    </main>

    <!-- Footer Situs -->
    <footer id="app-footer">
        <p>&copy; 2026 Teungku Zulkifli. Hak Cipta Dilindungi Undang-Undang.</p>
    </footer>

    <!-- JS Library Lokal (Hanya Marked.js untuk parser global) -->
    <script src="./js/lib/marked.min.js"></script>

    <!-- Logika Aplikasi Utama (Sebagai Satu-satunya Modern ES Module) -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
