<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar 07: Texture Mapping & Wrapping</title>
    <style>
        html, body { margin: 0; height: 100%; }
        #c { width: 100%; height: 100%; display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; font-size: 24px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">Memuat Gambar...</div>
    <canvas id="c"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // Import OrbitControls agar kita bisa memutar kamera pakai mouse untuk inspeksi
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        function main() {
            const canvas = document.querySelector('#c');
            const renderer = new THREE.WebGLRenderer({ antialias: true, canvas });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 4; // Mundur agak jauh

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            // Tambahkan OrbitControls agar mudah dilihat
            const controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;

            const loader = new THREE.TextureLoader();
            
            // PENTING: Ganti dengan URL foto kamu
            const textureUrl = '../assets/images/Teungku2D.jpg';

            loader.load(
                textureUrl,
                function ( texture ) {
                    document.getElementById('loading').style.display = 'none';

                    const objects = [];

                    // --- CONTOH 1: BINGKAI FOTO NORMAL (Mencegah Gepeng) ---
                    // Anggap fotomu rasio 3:4 (Portrait)
                    // Kita buat ukuran PlaneGeometry sesuai rasio (misal: Lebar 2, Tinggi 2)
                    const frameGeom = new THREE.PlaneGeometry(2, 2);
                    const frameMat = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        side: THREE.DoubleSide // Biar bisa dilihat dari belakang
                    });
                    const frameMesh = new THREE.Mesh(frameGeom, frameMat);
                    frameMesh.position.x = -2; // Taruh di Kiri
                    scene.add(frameMesh);
                    objects.push(frameMesh);


                    // --- CONTOH 2: WRAPPING (Efek Keramik Ubin) ---
                    // Kita muat tekstur yang sama tapi kita atur propertinya
                    const wrapTexture = texture.clone(); // Kloning tekstur agar settingan tidak bentrok
                    wrapTexture.needsUpdate = true;
                    
                    // Aktifkan mode pengulangan (Repeat Wrapping)
                    wrapTexture.wrapS = THREE.RepeatWrapping; // Ulang horizontal (S / X)
                    wrapTexture.wrapT = THREE.RepeatWrapping; // Ulang vertikal (T / Y)
                    
                    // Set berapa kali mau diulang
                    wrapTexture.repeat.set(3, 3); // Ulang 3x3 kali

                    // Buat Bidang Datar Lebar (Lantai)
                    const floorGeom = new THREE.PlaneGeometry(3, 3);
                    const floorMat = new THREE.MeshBasicMaterial({ 
                        map: wrapTexture,
                        side: THREE.DoubleSide
                    });
                    const floorMesh = new THREE.Mesh(floorGeom, floorMat);
                    floorMesh.position.x = 2; // Taruh di Kanan
                    
                    // Putar agar tiduran jadi lantai
                    floorMesh.rotation.x = Math.PI * -0.2; 
                    scene.add(floorMesh);
                    objects.push(floorMesh);

                    // --- ANIMASI ---
                    function render(time) {
                        controls.update(); // Update orbit controls
                        renderer.render(scene, camera);
                        requestAnimationFrame(render);
                    }
                    requestAnimationFrame(render);
                }
            );

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });
        }

        main();
    </script>
</body>
</html>
