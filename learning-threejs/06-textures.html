<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar 06: Texture Loading</title>
    <style>
        html, body { margin: 0; height: 100%; }
        #c { width: 100%; height: 100%; display: block; }
        
        /* Loading Text */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; font-size: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">Memuat Gambar...</div>
    <canvas id="c"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        function main() {
            const canvas = document.querySelector('#c');
            const renderer = new THREE.WebGLRenderer({ antialias: true, canvas });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 2; // Mundur agar kotak terlihat

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            // --- MODUL 3: TEKSTUR (Issue #13 & #14) ---
            
            // 1. Panggil Tukang Muat Gambar (TextureLoader)
            const loader = new THREE.TextureLoader();

            // 2. Muat Gambarnya (Load)
            // GANTI URL INI dengan path lokal foto Anda nanti, misalnya: '../assets/images/foto-profil.jpg'
            // Sementara kita pakai gambar online dari tempat pembuangan kucing (placekitten)
            const textureUrl = '../assets/images/Teungku2D.jpg'; 

            // Kita beritahu loader: "Tolong muat gambar ini. Kalau sudah selesai (onLoad), panggil fungsi di dalam { ... }"
            loader.load(
                textureUrl,
                
                // Fungsi ini berjalan JIKA gambar BERHASIL dimuat
                function ( texture ) {
                    // Sembunyikan tulisan loading HTML
                    document.getElementById('loading').style.display = 'none';

                    // 3. Buat Material (Bungkus) dengan gambar tadi
                    // Alih-alih pakai 'color', kita pakai 'map' untuk menaruh gambar
                    const material = new THREE.MeshBasicMaterial({ map: texture });
                    
                    // 4. Buat Kotaknya
                    const geometry = new THREE.BoxGeometry(1, 1, 1);
                    const cube = new THREE.Mesh(geometry, material);
                    
                    // 5. Masukkan ke Panggung
                    scene.add(cube);

                    // --- ANIMASI ---
                    // Kita taruh fungsi render di dalam sini agar animasi baru mulai KALAU gambar sudah siap
                    function render(time) {
                        time *= 0.001;
                        cube.rotation.x = time * 0.5;
                        cube.rotation.y = time * 0.5;

                        renderer.render(scene, camera);
                        requestAnimationFrame(render);
                    }
                    requestAnimationFrame(render);
                },

                // Fungsi ini berjalan JIKA ada ERROR (misal salah ketik nama file)
                undefined,
                function ( err ) {
                    document.getElementById('loading').innerText = "Gagal memuat gambar!";
                    console.error('Ada masalah saat memuat tekstur:', err);
                }
            );

            // Responsif
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });
        }

        main();
    </script>
</body>
</html>
